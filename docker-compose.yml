services:
  postgres-auth:
    image: postgres:16-alpine
    container_name: velvet-postgres-auth
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: velvet_auth
    ports:
      - "5432:5432"
    volumes:
      - postgres-auth-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-music:
    image: postgres:16-alpine
    container_name: velvet-postgres-music
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: velvet_music
    ports:
      - "5433:5432"
    volumes:
      - postgres-music-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-video:
    image: postgres:16-alpine
    container_name: velvet-postgres-video
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: velvet_video
    ports:
      - "5434:5432"
    volumes:
      - postgres-video-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: velvet-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ./backend/auth-service
      dockerfile: Dockerfile
    container_name: velvet-auth
    ports:
      - "8081:8081"
    depends_on:
      postgres-auth:
        condition: service_healthy
    restart: on-failure

  music-service:
    build:
      context: ./backend/music-service
      dockerfile: Dockerfile
    container_name: velvet-music
    ports:
      - "8082:8082"
    depends_on:
      postgres-music:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: on-failure

  video-service:
    build:
      context: ./backend/video-service
      dockerfile: Dockerfile
    container_name: velvet-video
    ports:
      - "8083:8083"
    depends_on:
      postgres-video:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres-auth-data:
  postgres-music-data:
  postgres-video-data:
  minio-data:
