version: '3.8'

services:
  postgres-auth:
    image: postgres:16
    container_name: velvet-postgres-auth
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: velvet_auth
    ports:
      - "5432:5432"
    volumes:
      - postgres-auth-data:/var/lib/postgresql/data

  postgres-music:
    image: postgres:16
    container_name: velvet-postgres-music
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: velvet_music
    ports:
      - "5433:5432"
    volumes:
      - postgres-music-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: velvet-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"

volumes:
  postgres-auth-data:
  postgres-music-data:
  minio-data: